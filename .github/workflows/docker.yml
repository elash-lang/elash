name: Build CI image

on:
  push:
    paths:
      - ".github/docker/Dockerfile"

jobs:
  docker:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .github/docker
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/elash-ci:latest

      - name: Make package public
        run: |
          gh api -X PATCH /repos/${{ github.repository }}/packages/container/elash-ci \
            -f visibility=public
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

