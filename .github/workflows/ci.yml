name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/elash-ci:latest

    env:
      CC: ccache cc
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Cache ccache
        uses: actions/cache@v6
        with:
          path: /ccache
          key: ${{ runner.os }}-ccache-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-${{ github.ref_name }}-
            ${{ runner.os }}-ccache-

      - name: Zero ccache stats
        run: ccache -z

      - name: Build
        run: make libelash-static elc -j$(nproc)

      - name: Show ccache stats
        run: ccache -s

      - name: Unit tests
        run: make unit-test

      - name: End-to-End tests
        run: make test-e2e
